<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Project Details | AlestA Dynamics</title>
</head>
<body class="bg-slate-900 flex flex-col min-h-screen text-slate-300 font-sans">

    <header class="flex justify-between items-center p-6 bg-slate-950 border-b border-emerald-500/20">
        <div class="flex flex-col items-end">
            <a class="text-emerald-500 font-bold text-xl font-mono tracking-tighter" href="index.html">
                alesta<span class="text-red-600">.</span>dynamics
            </a>
            <span class="text-white text-xs">By ege</span>
        </div>
        <nav class="text-emerald-500 tracking-widest font-mono text-xs flex gap-6">
             <a href="index.html" class="hover:text-white uppercase transition-all">Home</a>
             <a href="about.html" class="hover:text-white uppercase transition-all">About</a>
             <a href="contact.html" class="hover:text-white uppercase transition-all">Contact</a>
        </nav>
        </header>

    <main class="flex-grow p-6 md:p-20">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6">
                <a href="index.html" class="text-emerald-500 text-xs font-mono border border-emerald-500/30 px-4 py-2 hover:bg-emerald-500 hover:text-black transition-all">
                ← BACK_TO_SYSTEM
                </a>
            </div>
            <div class="flex items-center gap-4 mb-8 text-[10px] font-mono uppercase tracking-[0.3em] opacity-50">
                <span>Core</span> <span>/</span> <span id="project-path">Project_Name</span> <span>/</span> <span class="text-emerald-500">Live_Docs</span>
            </div>

            <div id="readme-container" class="prose prose-invert max-w-none 
                prose-headings:text-emerald-500 prose-headings:font-mono prose-headings:uppercase 
                prose-a:text-emerald-400 prose-code:text-red-400 prose-strong:text-white">
                <div class="flex flex-col items-center py-20 opacity-30 animate-pulse">
                    <div class="w-12 h-12 border-2 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 font-mono tracking-widest text-xs">DECRYPTING_DOCUMENTATION...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-950 p-6 border-t border-emerald-500/10 text-center text-[10px] font-mono text-slate-600">
        &copy; 2026 AlestA Dynamics | Integrated Engineering Portfolio
    </footer>

    <script>
        async function loadProjectDetails() {
            // 1. URL'den proje ismini çek (Örn: ?repo=alesta-s1-pro)
            const urlParams = new URLSearchParams(window.location.search);
            const repoName = urlParams.get('repo');
            
            if (!repoName) {
                window.location.href = 'index.html'; // Repo ismi yoksa ana sayfaya dön
                return;
            }

            document.getElementById('project-path').innerText = repoName.toUpperCase();
            const container = document.getElementById('readme-container');

            try {
                // 2. GitHub'dan ham README'yi çek
                const response = await fetch(`https://raw.githubusercontent.com/ege-labs/${repoName}/main/README.md`);
                
                if (!response.ok) throw new Error('System_Link_Failure');

                const markdown = await response.text();
                
                // 3. Render Et
                container.innerHTML = marked.parse(markdown);
                
            } catch (error) {
                container.innerHTML = `
                    <div class="border border-red-500/20 bg-red-500/5 p-10 text-center">
                        <h1 class="text-red-500 font-mono text-xl mb-4">[404_DATA_NOT_FOUND]</h1>
                        <p class="text-slate-500 font-mono text-xs">The requested documentation does not exist or is private.</p>
                    </div>
                `;
            }
        }

        loadProjectDetails();
    </script>
</body>
</html>
