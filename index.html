<script>
/**
 * AlestA Dynamics - GitHub Project Sync Engine
 * Refined for: Ege Ucyol (Mechanical Engineering @ Uni Bremen)
 */
async function getProjects() {
    const username = 'ege-labs';
    const container = document.getElementById('project-container');
    
    // BLACKLIST: Sitede görünmesini istemediğin repo isimlerini buraya ekle
    const excludedRepos = [
        'ege-labs.github.io', // Sitenin kendi kaynak kodu
        'Alesta-dynamics',    
    ]; 

    try {
        // We fetch repositories from the GitHub API sorted by “most recently updated”
        const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);
        const repos = await response.json();

        // First, clear the cache (this will delete any existing entries)
        container.innerHTML = '';

        repos.forEach(repo => {
            const isExcluded = excludedRepos.includes(repo.name);

            // Filtering: Retrieve those that are not forks and are not on the blacklist
            if (!repo.fork && !isExcluded) {
                
                // DATE FORMATTING: Engineering standards
                const published = new Date(repo.created_at).toLocaleDateString('en-US', { 
                    month: 'short', 
                    year: 'numeric' 
                });
                
                // UPDATE FORMAT: Full date
                const lastUpdate = new Date(repo.updated_at).toLocaleDateString('en-US', { 
                    month: 'short', 
                    day: '2-digit',
                    year: 'numeric' 
                });

                // DYNAMIC CARD DESIGN (Tailwind CSS)
                const card = `
                    <div class="group border border-emerald-500/10 p-6 bg-slate-950/40 hover:border-emerald-500/50 transition-all duration-500 flex flex-col justify-between h-80 shadow-2xl">
                        <div>
                            <div class="flex justify-between items-start mb-4 border-b border-slate-800/50 pb-2">
                                <h3 class="text-emerald-400 font-bold text-lg font-mono tracking-tighter truncate w-3/5">${repo.name}</h3>
                                <div class="flex flex-col items-end">
                                    <span class="text-[9px] text-slate-500 uppercase font-mono tracking-widest">Released</span>
                                    <span class="text-[10px] text-slate-300 font-bold font-mono">${published}</span>
                                </div>
                            </div>
                            
                            <p class="text-slate-400 text-xs leading-relaxed line-clamp-4 font-mono opacity-80">
                                ${repo.description || 'System data: No technical description available for this repository.'}
                            </p>
                        </div>
                        
                        <div class="pt-6 border-t border-slate-800/50 flex justify-between items-end">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-slate-600 uppercase font-mono tracking-widest">Last Update</span>
                                <span class="text-[10px] text-emerald-500/80 font-mono font-bold">${lastUpdate}</span>
                                <span class="text-[9px] text-slate-700 mt-1 uppercase font-mono">Status: <span class="text-emerald-900">Synchronized</span></span>
                            </div>
                            
                            <a href="project_details.html?repo=${repo.name}" 
                            class="text-[10px] bg-emerald-500/5 border border-emerald-500/20 px-4 py-2 text-emerald-500 font-bold uppercase tracking-[0.2em] hover:bg-emerald-500 hover:text-black transition-all duration-300">
                            View_Project_Details
                            </a>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            }
        });

    } catch (error) {
        // Error Condition: If the API connection is lost, the terminal displays a warning
        container.innerHTML = `
            <div class="col-span-full p-10 border border-red-500/20 bg-red-500/5 text-center">
                <p class="text-red-500 font-mono uppercase tracking-[0.3em] text-sm font-bold">
                    [Critical_Error]: Connection to GitHub_API_Cluster Failed
                </p>
            </div>
        `;
        console.error('System_Failure:', error);
    }
}

// Start the engine
getProjects();
</script>
